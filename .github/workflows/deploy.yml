name: Deploy PHP App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: 'Build and Test'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl
          coverage: none

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader
          else
            echo "No composer.json found, skipping"
          fi

      - name: Run tests
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            ./vendor/bin/phpunit
          else
            echo "No tests found, skipping"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .
          retention-days: 1

  deploy-dev:
    name: 'Deploy to Dev'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: php-app
          path: .

      - name: Deploy to Dev App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'technovadev-app'
          publish-profile: ${{ secrets.DEV_AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

  deploy-prod:
    name: 'Deploy to Prod'
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: php-app
          path: .

      - name: Deploy to Prod App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'technovaprod-app'
          publish-profile: ${{ secrets.PROD_AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
